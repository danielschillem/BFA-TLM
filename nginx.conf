############################################################
# LiptakoCare v3.0.0 — Configuration Nginx
# © 2025-2026 Alternatives-IT & ANABASE INC
#
# Architecture : 2 sous-domaines séparés
#   - liptako.bfa-tlm.online     → SPA React (Frontend)
#   - liptakocare.bfa-tlm.online → API Laravel (Backend)
#
# INSTRUCTIONS :
#   1. Copier dans /etc/nginx/sites-available/liptakocare
#   2. Créer le symlink : ln -s /etc/nginx/sites-available/liptakocare /etc/nginx/sites-enabled/
#   3. Tester : nginx -t && systemctl reload nginx
#   4. Activer SSL : certbot --nginx -d liptako.bfa-tlm.online -d liptakocare.bfa-tlm.online
############################################################

# ═══════════════════════════════════════════════════════════
# FRONTEND — liptako.bfa-tlm.online (SPA React)
# ═══════════════════════════════════════════════════════════

server {
    listen 80;
    server_name liptako.bfa-tlm.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name liptako.bfa-tlm.online;

    # SSL — Certbot remplira automatiquement
    # ssl_certificate /etc/letsencrypt/live/liptako.bfa-tlm.online/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/liptako.bfa-tlm.online/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/liptakocare/Frontend/dist;
    index index.html;

    charset utf-8;

    # ── Logs ──
    access_log /var/log/nginx/liptako-front-access.log;
    error_log  /var/log/nginx/liptako-front-error.log;

    # ── Headers de sécurité ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Proxy same-origin vers l'API pour éviter le CORS navigateur ──
        location /api/v1/ {
            proxy_pass https://liptakocare.bfa-tlm.online;
            proxy_http_version 1.1;
            proxy_set_header Host liptakocare.bfa-tlm.online;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_ssl_server_name on;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        location = /broadcasting/auth {
            proxy_pass https://liptakocare.bfa-tlm.online;
            proxy_http_version 1.1;
            proxy_set_header Host liptakocare.bfa-tlm.online;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_ssl_server_name on;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

    # ── SPA — toutes les routes vers index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache agressif pour les assets avec hash Vite ──
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Bloquer fichiers sensibles ──
    location ~ /\. {
        deny all;
    }
}

# ═══════════════════════════════════════════════════════════
# BACKEND — liptakocare.bfa-tlm.online (API Laravel)
# ═══════════════════════════════════════════════════════════

server {
    listen 80;
    server_name liptakocare.bfa-tlm.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name liptakocare.bfa-tlm.online;

    # SSL — Certbot remplira automatiquement
    # ssl_certificate /etc/letsencrypt/live/liptakocare.bfa-tlm.online/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/liptakocare.bfa-tlm.online/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/liptakocare/Backend/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    # ── Logs ──
    access_log /var/log/nginx/liptako-api-access.log;
    error_log  /var/log/nginx/liptako-api-error.log;

    # ── Headers de sécurité ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── CORS preflight — répondre directement sans toucher PHP ──
    set $cors_origin "https://liptako.bfa-tlm.online";

    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, X-Requested-With, X-XSRF-TOKEN' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' 3600;
        add_header 'Content-Length' 0;
        return 204;
    }

    # ── Laravel — toutes les requêtes vers index.php ──
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ──
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # ── WebSocket Reverb ──
    location /app {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Bloquer l'accès aux fichiers sensibles ──
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ \.(env|log|sh|sql|bak|old|orig)$ {
        deny all;
    }

    location ~ ^/(artisan|composer\.(json|lock)|package\.json|phpunit\.xml) {
        deny all;
    }
}
