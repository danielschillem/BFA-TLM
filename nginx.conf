############################################################
# LiptakoCare v3.0.0 — Configuration Nginx
# © 2025-2026 Alternatives-IT & ANABASE INC
#
# INSTRUCTIONS :
#   1. Adapter server_name et les chemins
#   2. Activer SSL avec Certbot : certbot --nginx -d votre-domaine.bf
#   3. Copier dans /etc/nginx/sites-available/liptakocare
#   4. Créer le symlink : ln -s /etc/nginx/sites-available/liptakocare /etc/nginx/sites-enabled/
#   5. Tester : nginx -t && systemctl reload nginx
############################################################

server {
    listen 80;
    server_name __À_DÉFINIR__;

    # Redirection HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name __À_DÉFINIR__;

    # SSL — Certbot remplira ces lignes automatiquement
    # ssl_certificate /etc/letsencrypt/live/__À_DÉFINIR__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__À_DÉFINIR__/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/liptakocare/Backend/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 50M;

    # ── Logs ──
    access_log /var/log/nginx/liptakocare-access.log;
    error_log  /var/log/nginx/liptakocare-error.log;

    # ── Headers de sécurité (en complément du middleware Laravel) ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── API Laravel ──
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── SPA React (servie depuis public/spa/) ──
    location /spa {
        alias /var/www/liptakocare/Backend/public/spa;
        try_files $uri $uri/ /spa/index.html;

        # Cache agressif pour les assets statiques
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── PHP-FPM ──
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # ── WebSocket Reverb ──
    location /app {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Bloquer l'accès aux fichiers sensibles ──
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ \.(env|log|sh|sql|bak|old|orig)$ {
        deny all;
    }

    location ~ ^/(artisan|composer\.(json|lock)|package\.json|phpunit\.xml) {
        deny all;
    }
}
