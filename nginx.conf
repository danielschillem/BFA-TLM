############################################################
# LiptakoCare v3.0.0 — Configuration Nginx
# © 2025-2026 Alternatives-IT & ANABASE INC
#
# Architecture : SPA React à la racine + API Laravel sous /api
#
# INSTRUCTIONS :
#   1. Adapter server_name si besoin
#   2. Activer SSL avec Certbot : certbot --nginx -d liptako.bfa-tlm.online
#   3. Copier dans /etc/nginx/sites-available/liptakocare
#   4. Créer le symlink : ln -s /etc/nginx/sites-available/liptakocare /etc/nginx/sites-enabled/
#   5. Tester : nginx -t && systemctl reload nginx
############################################################

server {
    listen 80;
    server_name liptako.bfa-tlm.online;

    # Redirection HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name liptako.bfa-tlm.online;

    # SSL — Certbot remplira ces lignes automatiquement
    # ssl_certificate /etc/letsencrypt/live/liptako.bfa-tlm.online/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/liptako.bfa-tlm.online/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    charset utf-8;
    client_max_body_size 50M;

    # ── Logs ──
    access_log /var/log/nginx/liptakocare-access.log;
    error_log  /var/log/nginx/liptakocare-error.log;

    # ── Headers de sécurité (en complément du middleware Laravel) ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── API Laravel (préfixe /api et /broadcasting) ──
    location /api {
        # CORS permissif pour phase de test
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept, X-Requested-With, X-XSRF-TOKEN, X-Api-Path" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 3600 always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        alias /var/www/liptakocare/Backend/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /broadcasting {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        alias /var/www/liptakocare/Backend/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        alias /var/www/liptakocare/Backend/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM (traitement des requêtes PHP pour l'API) ──
    location ~ \.php$ {
        root /var/www/liptakocare/Backend/public;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # ── WebSocket Reverb ──
    location /app {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Bloquer l'accès aux fichiers sensibles ──
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ \.(env|log|sh|sql|bak|old|orig)$ {
        deny all;
    }

    location ~ ^/(artisan|composer\.(json|lock)|package\.json|phpunit\.xml) {
        deny all;
    }

    # ── SPA React (racine — doit être en dernier) ──
    root /var/www/liptakocare/Backend/public/spa;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache agressif pour les assets statiques
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
