server {
    listen 80;
    listen [::]:80;
    server_name liptakocare.com www.liptakocare.com 167.172.180.160;

    root /var/www/liptakocare/Backend/public;
    index index.php index.html;

    # ─── Security headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max upload 50MB
    client_max_body_size 50M;

    # ─── API routes → Laravel (PHP-FPM) ───
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /broadcasting {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /storage {
        try_files $uri $uri/ =404;
    }

    # ─── PHP-FPM ───
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # ─── LiveKit WebSocket + API ───
    location /livekit/ {
        proxy_pass http://127.0.0.1:7880/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Reverb WebSocket ───
    location /app/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ─── SPA frontend (catch-all) ───
    location / {
        root /var/www/liptakocare/Backend/public/spa;
        try_files $uri $uri/ /index.html;
    }

    # ─── Block hidden files ───
    location ~ /\.(?!well-known) {
        deny all;
    }

    # ─── Logs ───
    access_log /var/log/nginx/liptakocare.access.log;
    error_log  /var/log/nginx/liptakocare.error.log;
}
