[build]
  command = "npm run build"
  publish = "dist"

# ── Security headers ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' wss: https:; frame-src 'self'; object-src 'none'; base-uri 'self'"

[[redirects]]
  from = "/api/v1/*"
  to = "https://tlm-temp-api.onrender.com/api/v1/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/broadcasting/auth"
  to = "https://tlm-temp-api.onrender.com/broadcasting/auth"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200