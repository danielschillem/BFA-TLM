############################################################
# LiptakoCare v3.0.0 — Nginx unifié DigitalOcean
# Frontend (SPA React) + Backend (API Laravel) — same-origin
#
# Architecture : un seul server block
#   /              → SPA React (fichiers statiques Vite)
#   /api/v1/       → Laravel PHP-FPM
#   /sanctum/      → Laravel PHP-FPM (CSRF cookies)
#   /broadcasting/ → Laravel PHP-FPM (auth)
#   /app/          → WebSocket Reverb (upgrade)
############################################################

server {
    listen 80 default_server;
    server_name _;
    server_tokens off;

    charset utf-8;
    client_max_body_size 2M;

    # ── Headers de sécurité ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Protection Slowloris ──
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # ── Upload : augmenter pour documents et DICOM ──
    location ~ ^/api/v1/(documents|dicom)/upload {
        client_max_body_size 50M;

        # Rewrite vers Laravel
        root /var/www/html/backend/public;
        try_files $uri /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 120;
        }
    }

    # ── API Laravel — /api/*, /sanctum/*, /broadcasting/*, /up ──
    location ~ ^/(api|sanctum|broadcasting|up|_debugbar)(/|$) {
        root /var/www/html/backend/public;
        try_files $uri /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 120;
        }
    }

    # ── Laravel PHP fallback (index.php direct) ──
    location = /index.php {
        root /var/www/html/backend/public;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
    }

    # ── WebSocket Reverb ──
    location /app {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Frontend SPA — assets statiques Vite avec cache long ──
    location /assets/ {
        root /var/www/html/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Fichiers statiques Frontend (icons, manifest, etc.) ──
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|webmanifest|json)$ {
        root /var/www/html/frontend;
        try_files $uri @spa;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── SPA — fallback vers index.html ──
    location / {
        root /var/www/html/frontend;
        try_files $uri $uri/ /index.html;
    }

    # ── Named location pour fallback SPA ──
    location @spa {
        root /var/www/html/frontend;
        try_files /index.html =404;
    }

    # ── Bloquer fichiers sensibles ──
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~ \.(env|log|sh|sql|bak|old|orig)$ {
        deny all;
    }

    # ── Healthcheck rapide ──
    location = /health {
        root /var/www/html/backend/public;
        try_files /index.php =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/public/index.php;
        fastcgi_param REQUEST_URI /up;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
