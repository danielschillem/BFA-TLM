databases:
  - name: tlm-temp-db
    databaseName: tlm_temp
    user: tlm_temp_user

services:
  - type: web
    name: tlm-temp-api
    runtime: docker
    rootDir: Backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://tlm-temp-api.onrender.com
      - key: FRONTEND_URL
        value: https://tlm-temp-front.netlify.app
      - key: APP_RUNTIME_MODE
        value: web
      - key: SEED_DEMO_DATA
        value: "true"
      - key: SEED_DATABASE_CLASS
        value: Database\Seeders\DatabaseSeeder
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: tlm-temp-db
          property: connectionString
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: warning
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: noreply@bfa-tlm.online
      - key: MAIL_FROM_NAME
        value: TLM Burkina Faso
      - key: CORS_ALLOWED_ORIGINS
        value: https://tlm-temp-front.netlify.app
      - key: REVERB_APP_ID
        value: tlm-temp
      - key: REVERB_APP_KEY
        sync: false
      - key: REVERB_APP_SECRET
        sync: false
      - key: REVERB_HOST
        value: tlm-temp-reverb.onrender.com
      - key: REVERB_PORT
        value: "443"
      - key: REVERB_SCHEME
        value: https
      - key: PASSPORT_PRIVATE_KEY
        sync: false
      - key: PASSPORT_PUBLIC_KEY
        sync: false

  - type: worker
    name: tlm-temp-queue
    runtime: docker
    rootDir: Backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        fromService:
          name: tlm-temp-api
          type: web
          envVarKey: APP_KEY
      - key: APP_URL
        value: https://tlm-temp-api.onrender.com
      - key: FRONTEND_URL
        value: https://tlm-temp-front.netlify.app
      - key: APP_RUNTIME_MODE
        value: worker
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: tlm-temp-db
          property: connectionString
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        fromService:
          name: tlm-temp-api
          type: web
          envVarKey: MAIL_HOST
      - key: MAIL_PORT
        fromService:
          name: tlm-temp-api
          type: web
          envVarKey: MAIL_PORT
      - key: MAIL_USERNAME
        fromService:
          name: tlm-temp-api
          type: web
          envVarKey: MAIL_USERNAME
      - key: MAIL_PASSWORD
        fromService:
          name: tlm-temp-api
          type: web
          envVarKey: MAIL_PASSWORD
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: noreply@bfa-tlm.online
      - key: MAIL_FROM_NAME
        value: TLM Burkina Faso
      - key: REVERB_APP_ID
        value: tlm-temp
      - key: REVERB_APP_KEY
        fromService:
          name: tlm-temp-api
          type: web
          envVarKey: REVERB_APP_KEY
      - key: REVERB_APP_SECRET
        fromService:
          name: tlm-temp-api
          type: web
          envVarKey: REVERB_APP_SECRET
      - key: REVERB_HOST
        value: tlm-temp-reverb.onrender.com
      - key: REVERB_PORT
        value: "443"
      - key: REVERB_SCHEME
        value: https

  - type: web
    name: tlm-temp-reverb
    runtime: docker
    rootDir: Backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        fromService:
          name: tlm-temp-api
          type: web
          envVarKey: APP_KEY
      - key: APP_URL
        value: https://tlm-temp-api.onrender.com
      - key: FRONTEND_URL
        value: https://tlm-temp-front.netlify.app
      - key: APP_RUNTIME_MODE
        value: reverb
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: tlm-temp-db
          property: connectionString
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: BROADCAST_CONNECTION
        value: reverb
      - key: MAIL_MAILER
        value: log
      - key: REVERB_APP_ID
        value: tlm-temp
      - key: REVERB_APP_KEY
        fromService:
          name: tlm-temp-api
          type: web
          envVarKey: REVERB_APP_KEY
      - key: REVERB_APP_SECRET
        fromService:
          name: tlm-temp-api
          type: web
          envVarKey: REVERB_APP_SECRET
      - key: REVERB_HOST
        value: tlm-temp-reverb.onrender.com
      - key: REVERB_PORT
        value: "443"
      - key: REVERB_SCHEME
        value: https
