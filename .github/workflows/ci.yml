name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────
  # Frontend : lint + test + build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Environment check
        run: npm run env:check

      - name: Lint
        run: npm run lint

      - name: Tests (Vitest)
        run: npm run test

      - name: Build production
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist
          retention-days: 3

  # ──────────────────────────────────────────────
  # Backend : phpunit
  # ──────────────────────────────────────────────
  backend:
    name: Backend (tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: tlm_bfa_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: testing
      APP_URL: http://127.0.0.1
      FRONTEND_URL: http://127.0.0.1:3000
      APP_KEY: base64:dGVzdGtleWZvcmNpdGVzdGtleWZvcmNp
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: tlm_bfa_test
      DB_USERNAME: root
      DB_PASSWORD: secret
      CACHE_STORE: array
      SESSION_DRIVER: array
      SESSION_SECURE_COOKIE: false
      SANCTUM_STATEFUL_DOMAINS: 127.0.0.1,127.0.0.1:3000
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, pdo, pdo_mysql, pdo_sqlite, xml, bcmath, openssl
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('Backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Environment check
        run: composer run-script env:check

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run PHPUnit
        run: php artisan test --without-tty
